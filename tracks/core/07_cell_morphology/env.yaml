name: c7_morph
channels: [conda-forge]
dependencies:
  # Conda-only: things needing system libs / lmod conflicts.
  # The pip packages (cajal, pot, torchgw, umap-learn, scikit-learn,
  # matplotlib, psutil, pytest) are installed by scripts/bootstrap_envs.sh
  # with PYTHONPATH unset — Sherlock's lmod py-numpy bleeds in otherwise
  # and pip fails with "Read-only file system: 'f2py'".
  - python=3.11
  - python-igraph
  - leidenalg
  - hdf5
  - h5py
  - pip
